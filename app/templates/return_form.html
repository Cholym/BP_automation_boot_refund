<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание заявки на возврат</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
          rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('main.dashboard') }}">
                ← Назад к панели
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-white">
                        <h3 class="mb-0">📝 Новая заявка на возврат</h3>
                    </div>
                    <div class="card-body">
                        {% if error %}
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            {{ error }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endif %}

                        <form method="POST" action="{{ url_for('main.create_return') }}">
                            <!-- Информация о покупке -->
                            <h5 class="mb-3 text-primary">Информация о покупке</h5>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="order_id" class="form-label">
                                        № Чека/Заказа *
                                    </label>
                                    <input type="text" class="form-control" 
                                           id="order_id" name="order_id" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="purchase_date" class="form-label">
                                        Дата покупки *
                                    </label>
                                    <input type="date" class="form-control" 
                                           id="purchase_date" name="purchase_date" required>
                                </div>
                            </div>

                            <!-- Информация о клиенте -->
                            <h5 class="mb-3 text-primary mt-4">Информация о клиенте</h5>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="customer_name" class="form-label">
                                        ФИО клиента *
                                    </label>
                                    <input type="text" class="form-control" 
                                           id="customer_name" name="customer_name" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="customer_phone" class="form-label">
                                        Телефон
                                    </label>
                                    <input type="tel" class="form-control" 
                                           id="customer_phone" name="customer_phone"
                                           placeholder="+7 (___) ___-__-__">
                                </div>
                            </div>

                            <!-- Информация о товаре -->
                            <h5 class="mb-3 text-primary mt-4">Информация о товаре</h5>
                            <div class="row mb-3">
                                <div class="col-md-8">
                                    <label for="product_name" class="form-label">
                                        Наименование товара *
                                    </label>
                                    <input type="text" class="form-control" 
                                           id="product_name" name="product_name" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="product_article" class="form-label">
                                        Артикул
                                    </label>
                                    <input type="text" class="form-control" 
                                           id="product_article" name="product_article">
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="amount" class="form-label">
                                        Сумма возврата (₽) *
                                    </label>
                                    <input type="number" class="form-control" 
                                           id="amount" name="amount" 
                                           step="0.01" min="0" required>
                                    <div class="form-text">
                                        До 500 ₽ — автоматическое согласование;
                                        свыше — согласование менеджером
                                    </div>
                                </div>
                            </div>

                            <!-- Причина возврата -->
                            <div class="mb-3">
                                <label for="reason" class="form-label">
                                    Причина возврата *
                                </label>
                                <textarea class="form-control" id="reason" name="reason" 
                                          rows="3" required></textarea>
                            </div>

                            <!-- Кнопки действий -->
                            <div class="d-flex justify-content-between mt-4">
                                <button type="reset" class="btn btn-outline-secondary">
                                    Очистить
                                </button>
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Создать заявку
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
