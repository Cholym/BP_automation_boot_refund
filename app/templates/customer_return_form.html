<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявка на возврат (клиент)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="col-lg-8 mx-auto">
        <h1 class="h3 mb-4">Заявка на возврат</h1>
        <p class="text-muted">Для суммы <strong>свыше 500 ₽</strong> приложите фото товара, упаковки или чека (хотя бы одно).</p>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST" action="{{ url_for('public.customer_return') }}" enctype="multipart/form-data" class="card shadow">
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">№ заказа / чека</label>
                        <input type="text" name="order_id" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Дата покупки</label>
                        <input type="date" name="purchase_date" class="form-control">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">ФИО *</label>
                    <input type="text" name="customer_name" class="form-control" required>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Телефон *</label>
                        <input type="tel" name="customer_phone" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">E-mail</label>
                        <input type="email" name="customer_email" class="form-control">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Наименование товара *</label>
                    <input type="text" name="product_name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Артикул</label>
                    <input type="text" name="product_article" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Сумма возврата (₽) *</label>
                    <input type="number" name="amount" class="form-control" step="0.01" min="0" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Причина *</label>
                    <select name="reason_code" class="form-select" required>
                        {% for code, title in reasons %}
                        <option value="{{ code }}">{{ title }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Комментарий / «Другое»</label>
                    <textarea name="reason_other" class="form-control" rows="2"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Фото (несколько файлов)</label>
                    <input type="file" name="photos" class="form-control" multiple accept="image/*">
                </div>
                <button type="submit" class="btn btn-primary btn-lg">Отправить заявку</button>
            </div>
        </form>
        <p class="mt-3 small"><a href="{{ url_for('main.login') }}">Вход для сотрудников</a></p>
    </div>
</div>
</body>
</html>
